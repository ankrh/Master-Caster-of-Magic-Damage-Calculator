<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoM Damage Calculator</title>
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --border: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --muted: #999;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; scrollbar-color: var(--border) transparent; }
  *::-webkit-scrollbar { width: 6px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem;
  }
  h1 {
    text-align: center;
    margin-bottom: 0.25rem;
    font-size: 1.5rem;
  }
  .version-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin: 0.5rem 0 0.25rem;
  }
  .version-bar label {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .version-bar select {
    padding: 0.35rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }

  /* --- Input Panels --- */
  .panels {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    min-width: 400px;
    flex: 0 1 480px;
  }
  .panel h2 {
    font-size: 1rem;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }
  .unit-select {
    font-size: 0.8rem;
    padding: 0.25rem 0.4rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    max-width: 180px;
  }
  .panel-fields.locked input,
  .panel-fields.locked select {
    opacity: 0.5;
    pointer-events: none;
  }
  .panel-fields.locked input[id$="Dmg"],
  .panel-fields.locked select[id$="Weapon"],
  .panel-fields.locked select[id$="Level"] {
    opacity: 1;
    pointer-events: auto;
  }
  .panel-fields select[id$="Weapon"].weapon-locked {
    opacity: 0.5;
    pointer-events: none;
  }
  .panel-fields select[id$="Level"]:disabled {
    opacity: 0.5;
  }
  .panel-fields {
    display: grid;
    grid-template-columns: auto 1fr 62px auto;
    align-items: center;
    row-gap: 0.65rem;
    column-gap: 0.5rem;
  }
  .panel-fields label {
    font-size: 0.9rem;
    white-space: nowrap;
    grid-column: 1;
  }
  .panel-fields input, .panel-fields select {
    padding: 0.35rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    text-align: center;
  }
  /* standalone input: skip col 2, land in col 3 */
  .panel-fields > input[type="number"] {
    grid-column: 3;
  }
  /* standalone select: span cols 2-4 */
  .panel-fields > select {
    grid-column: 2 / 5;
    text-align: left;
  }
  /* dropdown + input combos */
  .panel-fields > select.mid {
    grid-column: 2;
    text-align: left;
  }
  /* "30 +" prefix text in col 2, right-aligned */
  .prefix {
    grid-column: 2;
    text-align: right;
    color: var(--muted);
    font-size: 0.85rem;
    white-space: nowrap;
  }
  /* "%" suffix overlaps after col 3 */
  .suffix {
    color: var(--muted);
    font-size: 0.8rem;
    margin-left: -0.3rem;
  }
  /* Modified stat value (col 4) */
  .mod-val {
    grid-column: 4;
    font-size: 0.9rem;
    color: var(--accent);
    white-space: nowrap;
    min-width: 2.5em;
    visibility: hidden;
  }
  .mod-val.visible {
    visibility: visible;
  }
  /* --- Presets Sidebar --- */
  .page-layout {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    align-items: flex-start;
  }
  .presets {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    min-width: 180px;
    max-width: 200px;
    flex-shrink: 0;
    position: sticky;
    top: 1.5rem;
    max-height: calc(100vh - 3rem);
    overflow-y: auto;
  }
  .presets h2 {
    font-size: 0.9rem;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .presets button {
    display: block;
    width: 100%;
    padding: 0.45rem 0.6rem;
    margin-bottom: 0.4rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.78rem;
    text-align: left;
    cursor: pointer;
    line-height: 1.3;
  }
  .presets button:hover {
    background: var(--border);
  }
  .main-content {
    flex: 1;
    min-width: 0;
  }
  /* --- Common Fields --- */
  .common-fields {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .common-fields label {
    font-size: 0.9rem;
    white-space: nowrap;
    margin-left: 1rem;
  }
  .common-fields label:first-child {
    margin-left: 0;
  }
  .common-fields input, .common-fields select {
    padding: 0.35rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    text-align: center;
  }
  .common-fields input { width: 62px; }
  .common-fields select { text-align: left; }
  /* --- Combat Enchantments Box --- */
  .combat-enchantments {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1.25rem;
    margin: 0 auto 1rem;
    max-width: calc(340px + 340px + 1.5rem);
  }
  .combat-enchantments summary {
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--muted);
    user-select: none;
  }
  .combat-enchantments summary:hover {
    color: var(--text);
  }
  .enchantments-content {
    padding-top: 0.5rem;
  }
  .enchantments-content .abil-grid {
    margin-bottom: 0.4rem;
  }
  .enchant-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    font-size: 0.9rem;
    margin-top: 0.3rem;
  }
  .enchant-row select, .enchant-row-select {
    padding: 0.35rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    text-align: left;
  }
  .check-label {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    cursor: pointer;
    font-size: 0.9rem;
  }
  .check-label input[type="checkbox"] { margin: 0; cursor: pointer; }
  .disabled-field { opacity: 0.3; pointer-events: none; }
  /* --- Results --- */
  .results {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .dist-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    flex: 0 1 340px;
    min-width: 300px;
  }
  .dist-header {
    font-size: 1rem;
    font-weight: bold;
    margin-bottom: 0.75rem;
    text-align: center;
  }
  .dist-header .avg {
    color: var(--accent);
  }
  .dist-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  .dist-table th {
    color: var(--muted);
    font-weight: normal;
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    padding: 0.3rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .dist-table th:first-child { text-align: left; }
  .dist-table th:last-child { text-align: right; }
  .dist-table td {
    padding: 0.2rem 0.5rem;
    border: none;
  }
  .dist-table tr { border-bottom: 1px solid rgba(15, 52, 96, 0.4); }
  .dist-table .dmg-cell {
    text-align: left;
    font-weight: bold;
    width: 50px;
  }
  .dist-table .chance-cell {
    position: relative;
    text-align: right;
    padding-right: 0.5rem;
  }
  .chance-bar {
    position: absolute;
    left: 0;
    top: 1px;
    bottom: 1px;
    border-radius: 2px;
    opacity: 0.3;
  }
  .chance-text {
    position: relative;
    z-index: 1;
  }
  .dist-table .peak .chance-text {
    font-weight: bold;
    color: #fff;
  }
  .dist-scroll {
    max-height: 460px;
    overflow-y: auto;
  }
  /* --- Abilities Expandable Section --- */
  .abilities-section {
    margin-top: 0.75rem;
    border-top: 1px solid var(--border);
    padding-top: 0.5rem;
  }
  .abilities-section summary {
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--muted);
    user-select: none;
    padding: 0.25rem 0;
  }
  .abilities-section summary:hover {
    color: var(--text);
  }
  .abilities-content {
    padding-top: 0.5rem;
  }
  .abilities-content.locked .group-abilities input,
  .abilities-content.locked .group-abilities select,
  .abilities-content.locked .group-abilities label,
  .abilities-content.locked .group-enchantments .abil-num-row input,
  .abilities-content.locked .group-enchantments .abil-num-row select,
  .abilities-content.locked .group-enchantments .abil-num-row label {
    opacity: 0.5;
    pointer-events: none;
  }
  .abil-group-header {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin: 0.5rem 0 0.25rem;
    padding-bottom: 0.15rem;
    border-bottom: 1px solid rgba(15, 52, 96, 0.4);
  }
  .abil-group-header:first-child {
    margin-top: 0;
  }
  .abil-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.2rem 0.5rem;
  }
  .abil-check {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .abil-check input[type="checkbox"] {
    margin: 0;
    cursor: pointer;
  }
  .abil-num-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    margin: 0.15rem 0;
  }
  .abil-num-row label {
    flex: 1;
    white-space: nowrap;
  }
  .abil-num-row select {
    flex: none;
    padding: 0.2rem 0.3rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.8rem;
    text-align: left;
  }
  .abil-num-row:has(select) label {
    flex: none;
  }
  .abil-num-row input[type="number"] {
    width: 50px;
    padding: 0.2rem 0.3rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    color: var(--text);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>

<h1>Master/Caster of Magic &mdash; Damage Calculator</h1>
<div class="version-bar">
  <label for="gameVersion">Game Version:</label>
  <select id="gameVersion">
    <option value="mom_1.03.01" selected>MoM 1.31</option>

</div>

<div class="page-layout">

<div class="presets">

</div>

<div class="main-content">
<div class="panels">
  <div class="panel">
    <h2><span>Attacker</span><select id="aUnit" class="unit-select"><option value="custom">Custom</option></select></h2>
    <div class="panel-fields">
      <label>Unit Type</label>
      <select id="aAbil_unitType">

        <option value="hero">Hero</option>
        <option value="fantastic">Fantastic</option>

      <label>Figures</label>

      <label>Attack</label>
      <input type="number" id="aAtk" min="0" max="50" value="3">
      <span class="mod-val" id="aAtkMod"></span>

      <label>Ranged/Thrown/Breath</label>
      <select class="mid" id="aRtbType">
        <option value="none" selected>None</option>
        <option value="missile">Missile</option>
        <option value="boulder">Boulder</option>
        <option value="magic_c">Chaos magic</option>
        <option value="magic_n">Nature magic</option>
        <option value="magic_s">Sorcery magic</option>
        <option value="thrown">Thrown</option>
        <option value="fire">Fire breath</option>
        <option value="lightning">Lightning breath</option>
      </select>
      <input type="number" id="aRtb" min="0" max="50" value="0">
      <span class="mod-val" id="aRtbMod"></span>

      <label>To hit melee</label>
      <span class="prefix">30% +</span>
      <input type="number" id="aToHitMod" min="-20" max="70" value="0">
      <span class="mod-val" id="aToHitMeleeMod"></span>

      <label>To hit ranged/thrown/breath</label>
      <span class="prefix">30% +</span>
      <input type="number" id="aToHitRtbMod" min="-20" max="70" value="0">
      <span class="mod-val" id="aToHitRtbModDisp"></span>

      <label>To block</label>
      <span class="prefix">30% +</span>
      <input type="number" id="aToBlkMod" min="-20" max="70" value="0">
      <span class="mod-val" id="aToBlkModDisp"></span>

      <label>Defense</label>
      <input type="number" id="aDef" min="0" max="50" value="2">
      <span class="mod-val" id="aDefMod"></span>

      <label>Resistance</label>
      <input type="number" id="aRes" min="0" max="50" value="5">
      <span class="mod-val" id="aResMod"></span>

      <label>Hit Points</label>
      <input type="number" id="aHP" min="1" max="99" value="1">
      <span class="mod-val" id="aHPMod"></span>

      <label>Damage Taken</label>
      <input type="number" id="aDmg" min="0" max="999" value="0">
      <span class="mod-val"></span>

      <label>Level</label>

        <option value="regular">Regular</option>
        <option value="veteran">Veteran</option>
        <option value="elite">Elite</option>
        <option value="ultra_elite">Ultra Elite</option>
        <option value="champion">Champion</option>
      </select>

      <label>Weapon Type</label>
      <select id="aWeapon">
        <option value="normal" selected>Normal</option>
        <option value="magic">Magic</option>
        <option value="mithril">Mithril</option>
        <option value="adamantium">Adamantium</option>
      </select>
    </div>
    <details class="abilities-section">
      <summary>Abilities/Enchantments</summary>
      <div class="abilities-content" id="aAbilities"></div>
    </details>
  </div>

  <div class="panel">
    <h2><span>Defender</span><select id="bUnit" class="unit-select"><option value="custom">Custom</option></select></h2>
    <div class="panel-fields">
      <label>Unit Type</label>
      <select id="bAbil_unitType">
        <option value="normal">Normal</option>
        <option value="hero">Hero</option>
        <option value="fantastic">Fantastic</option>
      </select>

      <label>Figures</label>
      <input type="number" id="bFigs" min="1" max="9" value="4">
      <span class="mod-val"></span>

      <label>Attack</label>
      <input type="number" id="bAtk" min="0" max="50" value="3">
      <span class="mod-val" id="bAtkMod"></span>

      <label>Ranged/Thrown/Breath</label>
      <select class="mid" id="bRtbType">
        <option value="none" selected>None</option>
        <option value="missile">Missile</option>
        <option value="boulder">Boulder</option>
        <option value="magic_c">Magic (C)</option>
        <option value="magic_n">Magic (N)</option>
        <option value="magic_s">Magic (S)</option>
        <option value="thrown">Thrown</option>
        <option value="fire">Fire</option>
        <option value="lightning">Lightning</option>
      </select>
      <input type="number" id="bRtb" min="0" max="50" value="0">
      <span class="mod-val" id="bRtbMod"></span>

      <label>To hit melee</label>
      <span class="prefix">30% +</span>
      <input type="number" id="bToHitMod" min="-20" max="70" value="0">
      <span class="mod-val" id="bToHitMeleeMod"></span>

      <label>To hit ranged/thrown/breath</label>
      <span class="prefix">30% +</span>
      <input type="number" id="bToHitRtbMod" min="-20" max="70" value="0">
      <span class="mod-val" id="bToHitRtbModDisp"></span>

      <label>To block</label>
      <span class="prefix">30% +</span>
      <input type="number" id="bToBlkMod" min="-20" max="70" value="0">
      <span class="mod-val" id="bToBlkModDisp"></span>

      <label>Defense</label>
      <input type="number" id="bDef" min="0" max="50" value="2">
      <span class="mod-val" id="bDefMod"></span>

      <label>Resistance</label>
      <input type="number" id="bRes" min="0" max="50" value="5">
      <span class="mod-val" id="bResMod"></span>

      <label>Hit Points</label>
      <input type="number" id="bHP" min="1" max="99" value="1">
      <span class="mod-val" id="bHPMod"></span>

      <label>Damage Taken</label>
      <input type="number" id="bDmg" min="0" max="999" value="0">
      <span class="mod-val"></span>

      <label>Level</label>
      <select id="bLevel" disabled>
        <option value="normal" selected>Normal</option>
        <option value="regular">Regular</option>
        <option value="veteran">Veteran</option>
        <option value="elite">Elite</option>
        <option value="ultra_elite">Ultra Elite</option>
        <option value="champion">Champion</option>
      </select>

      <label>Weapon Type</label>
      <select id="bWeapon">
        <option value="normal" selected>Normal</option>
        <option value="magic">Magic</option>
        <option value="mithril">Mithril</option>
        <option value="adamantium">Adamantium</option>
      </select>
    </div>
    <details class="abilities-section">
      <summary>Abilities/Enchantments</summary>
      <div class="abilities-content" id="bAbilities"></div>
    </details>
  </div>
</div>

<details class="combat-enchantments">
  <summary>Both Sides Enchantments</summary>
  <div class="enchantments-content">
    <div class="enchant-row">
      <label class="abil-check"><input type="checkbox" id="enchDarkness"> Darkness/C. of Shadow/E. Night</label>
      <label class="abil-check"><input type="checkbox" id="enchHeavenlyLight"> True Light/H. Light</label>
      <label class="abil-check">Node aura:
        <select id="nodeAura" class="enchant-row-select">
          <option value="none" selected>None</option>
          <option value="chaos">Chaos</option>
          <option value="nature">Nature</option>
          <option value="sorcery">Sorcery</option>
        </select>
      </label>
    </div>
  </div>
</details>

<div class="common-fields">
  <label id="rangedCheckLabel" class="check-label">
    Ranged attack <input type="checkbox" id="rangedCheck" checked>
  </label>
  <label id="rangedDistLabel">Ranged attack distance:</label>
  <input type="number" id="rangedDist" min="1" max="99" value="1">
  <label>City walls:</label>
  <select id="cityWalls">
    <option value="none" selected>None</option>
    <option value="1">+1 def</option>
    <option value="3">+3 def</option>
  </select>
</div>

<div class="results" id="results">
  <div class="dist-panel" id="distA"></div>
  <div class="dist-panel" id="distB"></div>
</div>

</div><!-- /main-content -->
</div><!-- /page-layout -->

<script>
// --- Unit Database ---

const RACE_NAMES = {
  0: 'Barbarian', 1: 'Beastmen', 2: 'Dark Elf', 3: 'Draconian', 4: 'Dwarf',
  5: 'Gnoll', 6: 'Halfling', 7: 'High Elf', 8: 'High Men', 9: 'Klackon',
  10: 'Lizardman', 11: 'Nomad', 12: 'Orc', 13: 'Troll', 14: 'Special',
  15: 'Arcane', 16: 'Nature', 17: 'Sorcery', 18: 'Chaos', 19: 'Life', 20: 'Death',
};

// RangedType ID -> calculator ranged type
const RANGED_TYPE_MAP = {
  10: 'boulder', // boulder
  11: 'boulder', // cannon
  20: 'missile',
  21: 'missile', // sling
  30: 'magic_c', // chaos — lightning bolt (Warlock hero, Chaos Warrior hero, Storm Giant)
  31: 'magic_c', // chaos — fire bolt (Magicians, Warlocks, Golden One hero, Witch hero, etc., Efreet)
  32: 'magic_s', // sorcery — ice bolt (Wind Mage hero, Djinn); also illusion ball (Sage hero, Illusionist hero)
  33: 'magic_c', // chaos — death bolt (Necromancer hero, Shadow Demons, Demon Lord, Ghouls)
  34: 'magic_s', // sorcery (Water Elemental)
  35: 'magic_n', // nature — priest sparkles (Healer hero, Priestess hero, Priests, Shamans)

function buildAbilitiesUI(prefix) {
  const container = document.getElementById(prefix + 'Abilities');
  let gridDiv = null;
  let currentGroup = '';
  let currentGroupClass = '';
  for (const abil of ABILITY_DEFS) {
    if (abil.group && abil.group !== currentGroup) {
      currentGroup = abil.group;
      currentGroupClass = 'group-' + currentGroup.toLowerCase().replace(/[^a-z]+/g, '-');
      gridDiv = null;
      const header = document.createElement('div');
      header.className = 'abil-group-header';
      header.textContent = currentGroup;
      container.appendChild(header);
    }
    const id = prefix + 'Abil_' + abil.key;
    if (abil.type === 'bool') {
      if (!gridDiv) {
        gridDiv = document.createElement('div');
        gridDiv.className = 'abil-grid ' + currentGroupClass;
        container.appendChild(gridDiv);
      }
      const lbl = document.createElement('label');
      lbl.className = 'abil-check';
      lbl.innerHTML = `<input type="checkbox" id="${id}"> ${abil.label}`;
      gridDiv.appendChild(lbl);
    } else if (abil.type === 'select') {
      gridDiv = null;
      const row = document.createElement('div');
      row.className = 'abil-num-row ' + currentGroupClass;
      const opts = abil.options.map(([v, l]) => `<option value="${v}">${l}</option>`).join('');
      row.innerHTML = `<label for="${id}">${abil.label}</label><select id="${id}">${opts}</select>`;
      container.appendChild(row);
    } else {
      gridDiv = null;
      const row = document.createElement('div');
      row.className = 'abil-num-row ' + currentGroupClass;
      row.innerHTML = `<label for="${id}">${abil.label}</label><input type="number" id="${id}" value="0" min="-50" max="50">`;
      container.appendChild(row);
    }
  }
}

function parseAbilitiesFromUnit(unit) {
  const result = {};
  const abilities = unit.abilities || [];
  for (const abil of ABILITY_DEFS) {
    if (abil.type === 'bool') {
      // Match exact name or name=value
      result[abil.key] = abilities.some(a => a === abil.match || a.startsWith(abil.match + '='));
    } else {
      // Find name=value and extract the number
      const found = abilities.find(a => a.startsWith(abil.match + '='));
      if (found) {
        result[abil.key] = parseInt(found.split('=')[1]) || 0;
      } else if (abilities.includes(abil.match)) {
        // Value-less version (e.g., "Immolation" in CoM2)
        result[abil.key] = 1;
      } else {
        result[abil.key] = 0;
      }
    }
  }
  return result;
}

function applyAbilities(prefix, abilValues) {
  for (const abil of ABILITY_DEFS) {
    const el = document.getElementById(prefix + 'Abil_' + abil.key);
    if (!el) continue;
    if (abil.type === 'bool') {
      el.checked = !!abilValues[abil.key];
    } else if (abil.type === 'select') {
      el.value = abilValues[abil.key] || abil.options[0][0];
    } else {
      el.value = abilValues[abil.key] || 0;
    }
  }
}

function clearAbilities(prefix) {
  for (const abil of ABILITY_DEFS) {
    const el = document.getElementById(prefix + 'Abil_' + abil.key);
    if (!el) continue;
    if (abil.type === 'bool') {
      el.checked = false;
    } else if (abil.type === 'select') {
      el.value = abil.options[0][0];
    } else {
      el.value = 0;
    }
  }
}

// Parsed unit databases per version. Loaded on demand.
const unitDatabases = {};

function parseUnitsINI(text) {
  const units = [];
  let current = null;
  for (const rawLine of text.split('\n')) {
    const line = rawLine.trim();
    if (!line) continue;
    const secMatch = line.match(/^\[(\d+)\]$/);
    if (secMatch) {
      if (current) units.push(current);
      current = { index: parseInt(secMatch[1]) };
      continue;
    }
    if (!current) continue;
    const eqIdx = line.indexOf('=');
    if (eqIdx < 0) continue;
    const key = line.substring(0, eqIdx).trim();
    const val = line.substring(eqIdx + 1).trim();
    current[key] = val;
  }
  if (current) units.push(current);
  return units;
}

function iniUnitToCalcStats(u) {
  const atk = parseInt(u.Attack) || 0;
  const def = parseInt(u.Defense) || 0;
  const res = parseInt(u.Resistance) || 0;
  const hp = parseInt(u.HP) || 1;
  const figs = parseInt(u.Figures) || 1;
  const hit = parseInt(u.Hit) || 30;
  const toHitMod = hit - 30;

  // Ranged
  let rangedType = 'none';
  let ranged = 0;
  if (u.Ranged && parseInt(u.Ranged) > 0) {
    ranged = parseInt(u.Ranged);
    const rt = parseInt(u.RangedType) || 20;
    rangedType = RANGED_TYPE_MAP[rt] || 'missile';
  }

  // Thrown / Breath
  let thrownType = 'none';
  let thrown = 0;
  if (u.Thrown && parseInt(u.Thrown) > 0) {
    thrownType = 'thrown';
    thrown = parseInt(u.Thrown);
  } else if (u.FireBreath && parseInt(u.FireBreath) > 0) {
    thrownType = 'fire';
    thrown = parseInt(u.FireBreath);
  } else if (u.LightningBreath && parseInt(u.LightningBreath) > 0) {
    thrownType = 'lightning';
    thrown = parseInt(u.LightningBreath);
  }

  return {
    figs, atk, def, res, hp, toHitMod, toBlkMod: 0, dmg: 0,
    rangedType, ranged, thrownType, thrown, weapon: 'normal',
  };
}

function getUnitDisplayName(u) {
  const name = u.Name || 'Unknown';
  const race = parseInt(u.Race);
  if (u.DisplayRace === 'Yes' && RACE_NAMES[race] && RACE_NAMES[race] !== 'Special') {
    return RACE_NAMES[race] + ' ' + name;
  }
  return name;
}

function getUnitCategory(u) {
  const idx = u.index;
  if (u.HeroType) return 'Heroes';
  if (idx >= 35 && idx <= 38) return 'General';
  const race = parseInt(u.Race);
  if (race >= 15) {  // fantastic creatures
    const realm = { 15: 'Arcane', 16: 'Nature', 17: 'Sorcery', 18: 'Chaos', 19: 'Life', 20: 'Death' };
    return (realm[race] || 'Fantastic') + ' Creatures';
  }
  if (RACE_NAMES[race]) return RACE_NAMES[race];
  return 'Other';
}

const VERSION_DATA = {
  'mom_1.03.01':    MOM_UNITS_DATA,
  'mom_cp_1.60.00': MOM_UNITS_DATA,
  'com_6.08':       COM2_UNITS_DATA,
  'com2_1.05.11':   COM2_UNITS_DATA,
};

function loadUnitDatabase(version) {
  if (unitDatabases[version]) return unitDatabases[version];
  const data = VERSION_DATA[version];
  if (!data) { unitDatabases[version] = []; return []; }
  // JSON is keyed by id string; convert to array
  unitDatabases[version] = Object.values(data);
  return unitDatabases[version];
}

function populateUnitDropdown(selectId, units) {
  const sel = document.getElementById(selectId);
  const oldVal = sel.value;

  // Clear all children except the first option (Custom)
  while (sel.children.length > 1) sel.removeChild(sel.children[1]);

  if (units.length === 0) return;

  // Group by category
  const groups = {};
  for (const u of units) {
    if (u.abilities && u.abilities.includes('CreateOutpost')) continue;  // settlers, omit
    const cat = u.category;
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(u);
  }

  // Desired category order
  const raceOrder = [
    // Arcanus
    'Barbarian', 'Gnoll', 'Halfling', 'High Elf', 'High Men', 'Klackon',
    'Lizardman', 'Nomad', 'Orc',
    // Myrran
    'Beastmen', 'Dark Elf', 'Draconian', 'Dwarven', 'Troll',
  ];
  const categoryOrder = [
    'Heroes', 'Generic',
    ...raceOrder,
    'Other',
    'Life', 'Death', 'Chaos',
    'Nature', 'Sorcery', 'Arcane',
  ];

  for (const cat of categoryOrder) {
    if (!groups[cat]) continue;
    const optgroup = document.createElement('optgroup');
    optgroup.label = cat;
    for (const u of groups[cat].slice().sort((a, b) => { const k = a.sort_order !== undefined ? 'sort_order' : 'cost'; return (a[k] || 0) - (b[k] || 0); })) {
      const opt = document.createElement('option');
      opt.value = String(u.id);
      opt.textContent = u.name;
      optgroup.appendChild(opt);
    }
    sel.appendChild(optgroup);
  }

  // Restore selection if it still exists, otherwise reset to custom
  if ([...sel.options].some(o => o.value === oldVal)) {
    sel.value = oldVal;
  } else {
    sel.value = 'custom';
  }
}

// Base stats storage for level bonus calculations (keyed by prefix 'a' or 'b')
const unitBaseStats = {};

function getLevelBonuses(level) {
  const version = document.getElementById('gameVersion').value;
  const isMoM = version.startsWith('mom_');
  if (isMoM) {
    switch (level) {
      case 'regular':    return { atk: 1, ranged: 1, thrown: 1, def: 0, res: 1, hp: 0, toHit: 0 };
      case 'veteran':    return { atk: 1, ranged: 1, thrown: 1, def: 1, res: 2, hp: 0, toHit: 0 };
      case 'elite':      return { atk: 2, ranged: 2, thrown: 2, def: 1, res: 3, hp: 1, toHit: 10 };
      case 'ultra_elite':return { atk: 2, ranged: 2, thrown: 2, def: 2, res: 4, hp: 1, toHit: 20 };
      case 'champion':   return { atk: 3, ranged: 3, thrown: 3, def: 2, res: 5, hp: 2, toHit: 30 };
      default:           return { atk: 0, ranged: 0, thrown: 0, def: 0, res: 0, hp: 0, toHit: 0 };
    }
  } else {
    // CoM / CoM2
    switch (level) {
      case 'regular':    return { atk: 1, ranged: 1, thrown: 0, def: 0, res: 1, hp: 0, toHit: 0 };
      case 'veteran':    return { atk: 2, ranged: 2, thrown: 1, def: 1, res: 1, hp: 0, toHit: 0 };
      case 'elite':      return { atk: 2, ranged: 2, thrown: 1, def: 2, res: 2, hp: 1, toHit: 0 };
      case 'ultra_elite':return { atk: 3, ranged: 3, thrown: 1, def: 3, res: 2, hp: 1, toHit: 0 };
      case 'champion':   return { atk: 3, ranged: 3, thrown: 1, def: 3, res: 2, hp: 2, toHit: 10 };
      default:           return { atk: 0, ranged: 0, thrown: 0, def: 0, res: 0, hp: 0, toHit: 0 };
    }
  }
}

function applyLevelBonuses(prefix) {
  const base = unitBaseStats[prefix];
  if (!base) return;
  const level = document.getElementById(prefix + 'Level').value;
  const b = getLevelBonuses(level);
  // Write base stats to inputs (level bonuses shown in modified display)
  document.getElementById(prefix + 'Atk').value = base.atk;
  document.getElementById(prefix + 'Rtb').value = base.rtb;
  document.getElementById(prefix + 'Def').value = base.def;
  document.getElementById(prefix + 'Res').value = base.res;
  document.getElementById(prefix + 'HP').value = base.hp;
  document.getElementById(prefix + 'ToHitMod').value = base.toHitMod;
  updateModifiedDisplay(prefix);
}

// Show modified (final) stat values next to base stat fields
function updateModifiedDisplay(prefix) {
  const level = document.getElementById(prefix + 'Level').value;
  const lvl = getLevelBonuses(level);

  const weaponType = document.getElementById(prefix + 'Weapon').value;
  const wpn = (function(type) {
    switch (type) {
      case 'magic':      return { atk: 0, def: 0, toHit: 10 };
      case 'mithril':    return { atk: 1, def: 1, toHit: 10 };
      case 'adamantium': return { atk: 2, def: 2, toHit: 10 };
      default:           return { atk: 0, def: 0, toHit: 0 };
    }
  })(weaponType);

  const rtbType = document.getElementById(prefix + 'RtbType').value;
  const RANGED_TYPES = ['missile', 'boulder', 'magic_c', 'magic_n', 'magic_s'];
  const THROWN_TYPES = ['thrown', 'fire', 'lightning'];
  const rangedType = RANGED_TYPES.includes(rtbType) ? rtbType : 'none';
  const thrownType = THROWN_TYPES.includes(rtbType) ? rtbType : 'none';
  const rangedGetsWpn = (rangedType === 'missile' || rangedType === 'boulder');
  const thrownGetsWpn = (thrownType === 'thrown');

  function showMod(id, base, bonus) {
    const el = document.getElementById(id);
    if (!el) return;
    if (bonus !== 0) {
      el.textContent = String(base + bonus);
      el.classList.add('visible');
    } else {
      el.textContent = '';
      el.classList.remove('visible');
    }
  }

  function showModPct(id, baseMod, bonus) {
    const el = document.getElementById(id);
    if (!el) return;
    if (bonus !== 0 || baseMod !== 0) {
      const finalPct = Math.min(100, Math.max(10, 30 + baseMod + bonus));
      el.textContent = finalPct + '%';
      el.classList.add('visible');
    } else {
      el.textContent = '';
      el.classList.remove('visible');
    }
  }

  // Read base values from inputs
  const baseAtk = parseInt(document.getElementById(prefix + 'Atk').value) || 0;
  const baseRtb = parseInt(document.getElementById(prefix + 'Rtb').value) || 0;
  const baseDef = parseInt(document.getElementById(prefix + 'Def').value) || 0;
  const baseRes = parseInt(document.getElementById(prefix + 'Res').value) || 0;
  const baseHP = parseInt(document.getElementById(prefix + 'HP').value) || 0;
  const baseToHitMod = parseInt(document.getElementById(prefix + 'ToHitMod').value) || 0;
  const baseToHitRtbMod = parseInt(document.getElementById(prefix + 'ToHitRtbMod').value) || 0;
  const baseToBlkMod = parseInt(document.getElementById(prefix + 'ToBlkMod').value) || 0;

  // Attack: level + weapon (weapon only if base > 0)
  const atkBonus = lvl.atk + (baseAtk > 0 ? wpn.atk : 0);
  showMod(prefix + 'AtkMod', baseAtk, atkBonus);

  // Ranged/Thrown/Breath: derive bonuses from type
  let rtbLvl = 0, rtbWpn = 0;
  if (rangedType !== 'none') {
    rtbLvl = baseRtb > 0 ? lvl.ranged : 0;
    rtbWpn = (baseRtb > 0 && rangedGetsWpn) ? wpn.atk : 0;
  } else if (thrownType !== 'none') {
    rtbLvl = lvl.thrown;
    rtbWpn = (baseRtb > 0 && thrownGetsWpn) ? wpn.atk : 0;
  }
  showMod(prefix + 'RtbMod', baseRtb, rtbLvl + rtbWpn);

  // Defense: level + weapon
  showMod(prefix + 'DefMod', baseDef, lvl.def + wpn.def);

  // Resistance: level only
  showMod(prefix + 'ResMod', baseRes, lvl.res);

  // HP: level only
  showMod(prefix + 'HPMod', baseHP, lvl.hp);

  // To Hit melee: level + weapon
  showModPct(prefix + 'ToHitMeleeMod', baseToHitMod, lvl.toHit + wpn.toHit);

  // To Hit ranged/thrown/breath: level + weapon bonus (missile/boulder only)
  const rtbToHitWpn = rangedGetsWpn ? wpn.toHit : 0;
  showModPct(prefix + 'ToHitRtbModDisp', baseToHitRtbMod, lvl.toHit + rtbToHitWpn);

  // To Block: no level/weapon bonus
  showModPct(prefix + 'ToBlkModDisp', baseToBlkMod, 0);
}

function applyUnit(prefix, unitIndex) {
  const version = document.getElementById('gameVersion').value;
  const units = unitDatabases[version] || [];
  const unit = units.find(u => u.id === unitIndex);
  if (!unit) return;

  // Store base stats for level bonus application
  const unitRtb = (unit.ranged && parseInt(unit.ranged) > 0) ? parseInt(unit.ranged)
                : (unit.breath && parseInt(unit.breath) > 0) ? parseInt(unit.breath) : 0;
  unitBaseStats[prefix] = {
    atk: unit.melee, def: unit.defense, res: unit.resist, hp: unit.hp,
    rtb: unitRtb,
    toHitMod: unit.to_hit || 0,
  };

  document.getElementById(prefix + 'Figs').value = unit.figures || 1;
  document.getElementById(prefix + 'ToBlkMod').value = 0;
  document.getElementById(prefix + 'Dmg').value = 0;
  // Determine merged RTB type: ranged takes priority, then breath/thrown
  const rtbType = (unit.ranged_type && unit.ranged_type !== 'none') ? unit.ranged_type
                : (unit.breath_type && unit.breath_type !== 'none') ? unit.breath_type
                : 'none';
  document.getElementById(prefix + 'RtbType').value = rtbType;
  // Set unit type
  const unitTypeSel = document.getElementById(prefix + 'Abil_unitType');
  if (unitTypeSel) {
    const cat = unit.category || '';
    const hasFantasticAbility = (unit.abilities || []).some(a => a === 'Fantastic' || a === 'Fantastic=1');
    unitTypeSel.value = cat === 'Heroes' ? 'hero'
                      : (cat.endsWith(' Creatures') || hasFantasticAbility) ? 'fantastic'
                      : 'normal';
  }
  // Set abilities
  const abilValues = parseAbilitiesFromUnit(unit);
  applyAbilities(prefix, abilValues);
  // Apply level bonuses on top of base stats
  applyLevelBonuses(prefix);
}

function updateUnitLock(prefix) {
  const sel = document.getElementById(prefix + 'Unit');
  const fields = sel.closest('.panel').querySelector('.panel-fields');
  const abilContent = document.getElementById(prefix + 'Abilities');
  const isCustom = sel.value === 'custom';
  fields.classList.toggle('locked', !isCustom);
  abilContent.classList.toggle('locked', !isCustom);

  const unitTypeSel = document.getElementById(prefix + 'Abil_unitType');
  if (unitTypeSel) unitTypeSel.disabled = !isCustom;

  const levelSel = document.getElementById(prefix + 'Level');
  const weaponSel = document.getElementById(prefix + 'Weapon');
  if (!isCustom) {
    const version = document.getElementById('gameVersion').value;
    const units = unitDatabases[version] || [];
    const unit = units.find(u => u.id === parseInt(sel.value));
    const hasFantasticAbility = unit && (unit.abilities || []).some(a => a === 'Fantastic' || a === 'Fantastic=1');
    const isFantastic = unit && (unit.category === 'Heroes' || (unit.category || '').endsWith(' Creatures') || hasFantasticAbility);
    const isZombies = unit && unit.name === 'Zombies';
    if (isFantastic) {
      levelSel.value = 'normal';
      if (!isZombies) weaponSel.value = 'normal';
    }
    applyUnit(prefix, parseInt(sel.value));
    levelSel.disabled = isFantastic;
    weaponSel.classList.toggle('weapon-locked', isFantastic && !isZombies);
  } else {
    delete unitBaseStats[prefix];
    weaponSel.classList.remove('weapon-locked');
    updateCustomLevelState(prefix);
  }
}

// For custom units: enable level and weapon only when unit type is "normal"
function updateCustomLevelState(prefix) {
  const sel = document.getElementById(prefix + 'Unit');
  if (sel.value !== 'custom') return;
  const levelSel = document.getElementById(prefix + 'Level');
  const weaponSel = document.getElementById(prefix + 'Weapon');
  const unitTypeSel = document.getElementById(prefix + 'Abil_unitType');
  const isNormal = !unitTypeSel || unitTypeSel.value === 'normal';
  levelSel.disabled = !isNormal;
  if (!isNormal) levelSel.value = 'normal';
  weaponSel.classList.toggle('weapon-locked', !isNormal);
  if (!isNormal) weaponSel.value = 'normal';
}

// Cross-version unit name aliases (CoM2 name → MoM name and vice versa)
const UNIT_NAME_ALIASES = {
  'Shamans': 'Shaman',       'Shaman': 'Shamans',
  'Chimeras': 'Chimera',     'Chimera': 'Chimeras',
  'Phantom Warriors': 'Phantom Warrior', 'Phantom Warrior': 'Phantom Warriors',
  'Pegasai': 'Pegasi',       'Pegasi': 'Pegasai',
  'Archangel': 'Arch Angel', 'Arch Angel': 'Archangel',
  'Orc Warrior': 'Orc Archer', 'Orc Archer': 'Orc Warrior',
};

function getUnitHeroArchetype(name) {
  // "Dwarf (Brax)" → "Dwarf"
  const m = (name || '').match(/^(.+?)\s*\(.*\)$/);
  return m ? m[1].trim() : null;
}

function findMatchingUnit(units, oldUnit) {
  if (!oldUnit) return null;
  const oldName = oldUnit.name;
  // 1. Exact name match
  let match = units.find(u => u.name === oldName);
  if (match) return match;
  // 2. Try alias
  const aliased = UNIT_NAME_ALIASES[oldName];
  if (aliased) {
    match = units.find(u => u.name === aliased);
    if (match) return match;
  }
  // 3. Hero archetype match (e.g. "Dwarf (Brax)" matches "Dwarf (Brax)" across versions)
  const arch = getUnitHeroArchetype(oldName);
  if (arch) {
    match = units.find(u => getUnitHeroArchetype(u.name) === arch);
    if (match) return match;
  }
  return null;
}

function onVersionChange() {
  const version = document.getElementById('gameVersion').value;
  const aUnitSel = document.getElementById('aUnit');
  const bUnitSel = document.getElementById('bUnit');
  // Remember currently selected units before repopulating
  const oldAId = aUnitSel.value;
  const oldBId = bUnitSel.value;
  const oldAUnit = oldAId !== 'custom' ? (Object.values(unitDatabases).flat().find(u => String(u.id) === oldAId) || null) : null;
  const oldBUnit = oldBId !== 'custom' ? (Object.values(unitDatabases).flat().find(u => String(u.id) === oldBId) || null) : null;

  const units = loadUnitDatabase(version);
  populateUnitDropdown('aUnit', units);
  populateUnitDropdown('bUnit', units);

  // Only do cross-version name matching if populateUnitDropdown didn't already
  // restore the selection by ID (i.e. the unit ID doesn't exist in the new roster)
  for (const [prefix, oldUnit, sel] of [['a', oldAUnit, aUnitSel], ['b', oldBUnit, bUnitSel]]) {
    if (!oldUnit) continue;
    // If the dropdown already restored to the same ID, no need to re-match
    if (sel.value !== 'custom') continue;
    const matched = findMatchingUnit(units, oldUnit);
    if (matched) {
      sel.value = String(matched.id);
    }
  }

  updateUnitLock('a');
  updateUnitLock('b');
  updateTypeVisibility();
  updateModifiedDisplay('a');
  updateModifiedDisplay('b');
  calculate();
}

document.getElementById('gameVersion').addEventListener('change', onVersionChange);
document.getElementById('aUnit').addEventListener('change', () => {
  updateUnitLock('a');
  updateTypeVisibility();
  updateModifiedDisplay('a');
  calculate();
});
document.getElementById('bUnit').addEventListener('change', () => {
  updateUnitLock('b');
  updateTypeVisibility();
  updateModifiedDisplay('b');
  calculate();
});

document.getElementById('aLevel').addEventListener('change', () => {
  applyLevelBonuses('a');
  calculate();
});
document.getElementById('bLevel').addEventListener('change', () => {
  applyLevelBonuses('b');
  calculate();
});

// --- Probability Engine ---

function binomCoeff(n, k) {
  if (k < 0 || k > n) return 0;
  if (k === 0 || k === n) return 1;
  if (k > n - k) k = n - k;
  let result = 1;
  for (let i = 0; i < k; i++) result = result * (n - i) / (i + 1);
  return result;
}

function binomialPMF(n, p) {
  const pmf = new Array(n + 1);
  for (let k = 0; k <= n; k++)
    pmf[k] = binomCoeff(n, k) * Math.pow(p, k) * Math.pow(1 - p, n - k);
  return pmf;
}

function singleAttackDmgDist(atkStr, toHit, defStr, toBlock, hp) {
  const hitsPMF = binomialPMF(atkStr, toHit);
  const blocksPMF = binomialPMF(defStr, toBlock);

  const chainDmg = new Array(atkStr + 1);
  chainDmg[0] = [1];

  for (let e = 1; e <= atkStr; e++) {
    chainDmg[e] = new Array(e + 1).fill(0);
    for (let b = 0; b <= defStr; b++) {
      const net = Math.max(e - b, 0);
      if (net < hp) {
        chainDmg[e][net] += blocksPMF[b];
      } else {
        const excess = net - hp;
        const sub = chainDmg[excess];
        for (let d = 0; d < sub.length; d++) {
          if (sub[d] < 1e-15) continue;
          chainDmg[e][hp + d] += blocksPMF[b] * sub[d];
        }
      }
    }
  }

  const dist = new Array(atkStr + 1).fill(0);
  for (let h = 0; h <= atkStr; h++) {
    if (hitsPMF[h] < 1e-15) continue;
    const sub = chainDmg[h];
    for (let d = 0; d < sub.length; d++) {
      if (sub[d] < 1e-15) continue;
      dist[d] += hitsPMF[h] * sub[d];
    }
  }
  return dist;
}

function convolveDists(a, b, cap) {
  const result = new Array(cap + 1).fill(0);
  for (let i = 0; i < a.length; i++) {
    if (a[i] < 1e-15) continue;
    for (let j = 0; j < b.length; j++) {
      if (b[j] < 1e-15) continue;
      result[Math.min(i + j, cap)] += a[i] * b[j];
    }
  }
  return result;
}

function calcTotalDamageDist(atkFigs, atkStr, toHit, defStr, toBlock, hp, cap) {
  const single = singleAttackDmgDist(atkStr, toHit, defStr, toBlock, hp);

  let result = [1];
  let base = single;
  let n = atkFigs;
  while (n > 0) {
    if (n & 1) result = convolveDists(result, base, cap);
    n >>= 1;
    if (n > 0) base = convolveDists(base, base, cap);
  }
  return result;
}

// --- UI ---

function formatPct(p) {
  return (p * 100).toFixed(1) + '%';
}

function renderDistPanel(container, title, dist, totalHP, hp, numFigs) {
  // Find max non-negligible damage
  let maxD = dist.length - 1;
  while (maxD > 0 && dist[maxD] < 1e-10) maxD--;

  // Compute expected damage
  let expected = 0;
  for (let d = 0; d < dist.length; d++) expected += d * dist[d];

  // Find peak probability
  let peakProb = 0;
  for (let d = 0; d <= maxD; d++) {
    if ((dist[d] || 0) > peakProb) peakProb = dist[d];
  }

  // Bar color
  const barColor = '#e94560';

  let html = `<div class="dist-header">${title}: <span class="avg">${expected.toFixed(3)}</span></div>`;
  html += '<div class="dist-scroll"><table class="dist-table">';
  html += '<thead><tr><th>Damage</th><th style="text-align:right">Chance</th></tr></thead><tbody>';

  for (let d = 0; d <= maxD; d++) {
    const p = dist[d] || 0;
    const barWidth = peakProb > 0 ? (p / peakProb) * 100 : 0;
    const isPeak = peakProb > 0 && Math.abs(p - peakProb) < 1e-15;
    const isKill = d >= totalHP;

    // Figure kill annotation
    let dmgLabel = '' + d;
    if (numFigs > 1 && hp > 0 && d > 0 && d % hp === 0) {
      const kills = d / hp;
      if (kills === numFigs) dmgLabel += ' ☠';
    } else if (numFigs === 1 && d >= totalHP) {
      dmgLabel += ' ☠';
    }

    html += `<tr class="${isPeak ? 'peak' : ''}">`;
    html += `<td class="dmg-cell">${dmgLabel}</td>`;
    html += `<td class="chance-cell">`;
    html += `<span class="chance-bar" style="width:${barWidth}%;background:${isKill ? '#ff4444' : barColor}"></span>`;
    html += `<span class="chance-text">${formatPct(p)}</span>`;
    html += `</td></tr>`;
  }

  html += '</tbody></table></div>';
  container.innerHTML = html;
}

function calculate() {
  // Clamp a percentage to 10%–100% (MoM rules: always at least 10%, at most 100%)
  function clampPct(base, mod) {
    return Math.min(1.0, Math.max(0.1, (base + mod) / 100));
  }

  // Weapon type bonuses: { atk, def, toHit }
  // Magical/Mithril/Adamantium: +10% To Hit (melee, missile, boulder only)
  // Mithril: +1 atk (melee, missile, boulder, thrown), +1 def
  // Adamantium: +2 atk (same types), +2 def
  function weaponBonus(type) {
    switch (type) {
      case 'magic':      return { atk: 0, def: 0, toHit: 10 };
      case 'mithril':    return { atk: 1, def: 1, toHit: 10 };
      case 'adamantium': return { atk: 2, def: 2, toHit: 10 };
      default:           return { atk: 0, def: 0, toHit: 0 };
    }
  }

  // Level bonuses (applied on top of base stats shown in inputs)
  const aLvl = getLevelBonuses(document.getElementById('aLevel').value);
  const bLvl = getLevelBonuses(document.getElementById('bLevel').value);

  // Read attacker stats (inputs hold base values)
  const aFigs  = Math.max(1, parseInt(document.getElementById('aFigs').value) || 1);
  const aAtkBase = Math.max(0, parseInt(document.getElementById('aAtk').value) || 0);
  const aDef   = Math.max(0, parseInt(document.getElementById('aDef').value) || 0);
  const aRes   = Math.max(0, (parseInt(document.getElementById('aRes').value) || 0) + aLvl.res);
  const aToHitMod = parseInt(document.getElementById('aToHitMod').value) || 0;
  const aToBlk = clampPct(30, parseInt(document.getElementById('aToBlkMod').value) || 0);
  const aHP    = Math.max(1, (parseInt(document.getElementById('aHP').value) || 1) + aLvl.hp);
  const aDmg   = Math.max(0, parseInt(document.getElementById('aDmg').value) || 0);
  const aRtbTypeRaw = document.getElementById('aRtbType').value;
  const RANGED_TYPES_CALC = ['missile', 'boulder', 'magic_c', 'magic_n', 'magic_s'];
  const THROWN_TYPES_CALC = ['thrown', 'fire', 'lightning'];
  const aRangedType = RANGED_TYPES_CALC.includes(aRtbTypeRaw) ? aRtbTypeRaw : 'none';
  const aThrownTypeRaw = THROWN_TYPES_CALC.includes(aRtbTypeRaw) ? aRtbTypeRaw : 'none';
  const aRtbBase = Math.max(0, parseInt(document.getElementById('aRtb').value) || 0);
  const aRangedBase = aRangedType !== 'none' ? aRtbBase : 0;
  const aToHitRtbMod = parseInt(document.getElementById('aToHitRtbMod').value) || 0;
  const aWpn   = weaponBonus(document.getElementById('aWeapon').value);

  // Weapon + level atk bonus applies to: melee, missile, boulder, thrown (NOT magic ranged, breath)
  // Weapon toHit bonus applies to: melee, missile, boulder (NOT magic ranged, thrown, breath)
  // Weapon def bonus always applies
  const aAtk    = aAtkBase > 0 ? aAtkBase + aLvl.atk + aWpn.atk : 0;
  const aDefEff = aDef + aLvl.def + aWpn.def;
  const aMeleeToHit = clampPct(30, aToHitMod + aLvl.toHit + aWpn.toHit);

  // Ranged: atk bonus for missile/boulder, not magic. ToHit bonus for missile/boulder, not magic.
  const rangedGetsAtkBonus = (aRangedType === 'missile' || aRangedType === 'boulder');
  const aRangedLvl = aRangedBase > 0 ? aLvl.ranged : 0;
  const aRanged = aRangedBase > 0 ? aRangedBase + aRangedLvl + (rangedGetsAtkBonus ? aWpn.atk : 0) : 0;

  // Read defender stats (inputs hold base values)
  const bFigs  = Math.max(1, parseInt(document.getElementById('bFigs').value) || 1);
  const bAtkBase = Math.max(0, parseInt(document.getElementById('bAtk').value) || 0);
  const bDef   = Math.max(0, parseInt(document.getElementById('bDef').value) || 0);
  const bRes   = Math.max(0, (parseInt(document.getElementById('bRes').value) || 0) + bLvl.res);
  const bToHitMod = parseInt(document.getElementById('bToHitMod').value) || 0;
  const bToBlk = clampPct(30, parseInt(document.getElementById('bToBlkMod').value) || 0);
  const bHP    = Math.max(1, (parseInt(document.getElementById('bHP').value) || 1) + bLvl.hp);
  const bDmg   = Math.max(0, parseInt(document.getElementById('bDmg').value) || 0);
  const bWpn   = weaponBonus(document.getElementById('bWeapon').value);

  // Defender counter-attack is melee: gets both atk, toHit weapon + level bonuses
  const bAtk    = bAtkBase > 0 ? bAtkBase + bLvl.atk + bWpn.atk : 0;
  const bDefEff = bDef + bLvl.def + bWpn.def;
  const bToHit  = clampPct(30, bToHitMod + bLvl.toHit + bWpn.toHit);

  // Determine if this is a ranged attack
  const isRanged = document.getElementById('rangedCheck').checked && aRangedType !== 'none' && aRanged > 0;

  // Attack strength: ranged strength if ranged attack, melee otherwise
  const atkStrength = isRanged ? aRanged : aAtk;

  // To Hit: weapon bonus only for melee, missile, boulder (not magic ranged)
  let atkToHit;
  if (isRanged) {
    const wpnToHitForRanged = rangedGetsAtkBonus ? aWpn.toHit : 0;
    let distPenalty = 0;
    if (aRangedType === 'missile' || aRangedType === 'boulder') {
      const dist = Math.max(1, parseInt(document.getElementById('rangedDist').value) || 1);
      if (dist >= 9) distPenalty = -30;
      else if (dist >= 6) distPenalty = -20;
      else if (dist >= 3) distPenalty = -10;
    }
    atkToHit = clampPct(30, aToHitRtbMod + aLvl.toHit + wpnToHitForRanged + distPenalty);
  } else {
    atkToHit = aMeleeToHit;
  }

  // Thrown/Breath: attacker-only, melee only, no weapon To Hit bonus
  // Weapon atk bonus applies to thrown (mithril/adamantium), not to breath
  // Level bonus applies to thrown (not breath in some versions)
  const aThrownType = aThrownTypeRaw;
  const aThrownBase = aThrownType !== 'none' ? aRtbBase : 0;
  const thrownGetsAtkBonus = (aThrownType === 'thrown');
  const aThrownLvl = aThrownType !== 'none' ? aLvl.thrown : 0;
  const aThrownStr = aThrownBase > 0 ? aThrownBase + aThrownLvl + (thrownGetsAtkBonus ? aWpn.atk : 0) : 0;
  const aThrownToHit = clampPct(30, aToHitRtbMod + aLvl.toHit); // level To Hit bonus, no weapon To Hit bonus
  const hasThrown = !isRanged && aThrownType !== 'none' && aThrownStr > 0;
  // Lightning breath is armor piercing: halve defense (round down)
  const bDefForThrown = aThrownType === 'lightning' ? Math.floor(bDefEff / 2) : bDefEff;

  // Compute alive figures and remaining HP for each unit
  const aTotalHP = aFigs * aHP;
  const aAlive   = Math.max(0, aFigs - Math.floor(aDmg / aHP));
  const aRemHP   = Math.max(0, aTotalHP - aDmg);

  const bTotalHP = bFigs * bHP;
  const bAlive   = Math.max(0, bFigs - Math.floor(bDmg / bHP));
  const bRemHP   = Math.max(0, bTotalHP - bDmg);

  if (isRanged) {
    // Ranged: attacker shoots, no counter-attack, no thrown
    const dmgToB = aAlive > 0 && bRemHP > 0 && atkStrength > 0
      ? calcTotalDamageDist(aAlive, atkStrength, atkToHit, bDefEff, bToBlk, bHP, bRemHP)
      : [1];
    const dmgToA = [1]; // no counter-attack

    renderDistPanel(document.getElementById('distA'), 'Damage to Attacker (no counter)', dmgToA, aRemHP, aHP, aAlive);
    renderDistPanel(document.getElementById('distB'), 'Ranged Damage to Defender', dmgToB, bRemHP, bHP, bAlive);

  } else if (hasThrown) {
    // Melee with thrown/breath: thrown first, then simultaneous melee exchange
    // Step 1: Thrown damage distribution (all attacker figures throw)
    const thrownDist = aAlive > 0 && bRemHP > 0
      ? calcTotalDamageDist(aAlive, aThrownStr, aThrownToHit, bDefForThrown, bToBlk, bHP, bRemHP)
      : [1];

    // For each possible thrown damage, compute melee and counter-attack
    const totalDmgToB = new Array(bRemHP + 1).fill(0); // total damage to defender
    const totalDmgToA = new Array(aRemHP + 1).fill(0); // total damage to attacker

    for (let tDmg = 0; tDmg < thrownDist.length; tDmg++) {
      if (thrownDist[tDmg] < 1e-15) continue;
      const pThrown = thrownDist[tDmg];

      // Defender state after thrown damage
      const bDmgAfter = bDmg + tDmg;
      const bAliveAfter = Math.max(0, bFigs - Math.floor(bDmgAfter / bHP));
      const bRemHPAfter = Math.max(0, bRemHP - tDmg);

      // Step 5a: Attacker's melee vs defender (capped at remaining defender HP)
      const meleeDist = aAlive > 0 && bRemHPAfter > 0 && aAtk > 0
        ? calcTotalDamageDist(aAlive, aAtk, aMeleeToHit, bDefEff, bToBlk, bHP, bRemHPAfter)
        : [1];

      // Step 5b: Defender's counter-attack (surviving figures after thrown)
      const counterDist = bAliveAfter > 0 && aRemHP > 0 && bAtk > 0
        ? calcTotalDamageDist(bAliveAfter, bAtk, bToHit, aDefEff, aToBlk, aHP, aRemHP)
        : [1];

      // Combine thrown + melee for total damage to defender
      for (let mDmg = 0; mDmg < meleeDist.length; mDmg++) {
        if (meleeDist[mDmg] < 1e-15) continue;
        const totalD = Math.min(tDmg + mDmg, bRemHP);
        totalDmgToB[totalD] += pThrown * meleeDist[mDmg];
      }

      // Counter-attack damage to attacker
      for (let cDmg = 0; cDmg < counterDist.length; cDmg++) {
        if (counterDist[cDmg] < 1e-15) continue;
        totalDmgToA[cDmg] += pThrown * counterDist[cDmg];
      }
    }

    renderDistPanel(document.getElementById('distA'), 'Damage to Attacker', totalDmgToA, aRemHP, aHP, aAlive);
    renderDistPanel(document.getElementById('distB'), 'Damage to Defender (thrown+melee)', totalDmgToB, bRemHP, bHP, bAlive);

  } else {
    // Pure melee: simultaneous exchange
    const dmgToB = aAlive > 0 && bRemHP > 0 && aAtk > 0
      ? calcTotalDamageDist(aAlive, aAtk, aMeleeToHit, bDefEff, bToBlk, bHP, bRemHP)
      : [1];

    const dmgToA = bAlive > 0 && aRemHP > 0 && bAtk > 0
      ? calcTotalDamageDist(bAlive, bAtk, bToHit, aDefEff, aToBlk, aHP, aRemHP)
      : [1];

    renderDistPanel(document.getElementById('distA'), 'Damage to Attacker', dmgToA, aRemHP, aHP, aAlive);
    renderDistPanel(document.getElementById('distB'), 'Damage to Defender', dmgToB, bRemHP, bHP, bAlive);
  }
}

    expected: { dmgToA: 0.595, dmgToB: 2.697 },
  },
  breathLightning: {

    b: { figs:6, atk:2, def:3, res:5 },

const UNIT_DEFAULTS = {
  figs: 1, atk: 0, rtbType: 'none', rtb: 0,
  def: 0, res: 0,
  toHitMod: 0, toHitRtbMod: 0,
  toBlkMod: 0, hp: 1, dmg: 0, weapon: 'normal', abilities: {},
};

function applyPreset(name) {
  const preset = PRESETS[name];
  if (!preset) return;
  function setUnit(prefix, u) {
    const s = { ...UNIT_DEFAULTS, ...u };
    document.getElementById(prefix + 'Figs').value = s.figs;
    document.getElementById(prefix + 'Atk').value = s.atk;
    document.getElementById(prefix + 'RtbType').value = s.rtbType;
    document.getElementById(prefix + 'Rtb').value = s.rtb;
    document.getElementById(prefix + 'Def').value = s.def;
    document.getElementById(prefix + 'Res').value = s.res;
    document.getElementById(prefix + 'ToHitMod').value = s.toHitMod;
    document.getElementById(prefix + 'ToHitRtbMod').value = s.toHitRtbMod;
    document.getElementById(prefix + 'ToBlkMod').value = s.toBlkMod;
    document.getElementById(prefix + 'HP').value = s.hp;
    document.getElementById(prefix + 'Dmg').value = s.dmg;
    document.getElementById(prefix + 'Weapon').value = s.weapon;
    clearAbilities(prefix);
    applyAbilities(prefix, s.abilities);
  }
  setUnit('a', preset.a || {});
  setUnit('b', preset.b || {});
  document.getElementById('aUnit').value = 'custom';
  document.getElementById('bUnit').value = 'custom';
  updateUnitLock('a');
  updateUnitLock('b');
  document.getElementById('rangedCheck').checked = preset.rangedCheck || false;
  document.getElementById('rangedDist').value = preset.rangedDist || 1;
  document.getElementById('cityWalls').value = preset.cityWalls || 'none';
  document.getElementById('nodeAura').value = preset.nodeAura || 'none';
  document.getElementById('enchDarkness').checked = preset.enchDarkness || false;
  document.getElementById('enchHeavenlyLight').checked = preset.enchHeavenlyLight || false;
  updateTypeVisibility();
  updateModifiedDisplay('a');
  updateModifiedDisplay('b');
  calculate();
}

function updateTypeVisibility() {
  ['aRtbType', 'bRtbType'].forEach(id => {
    const sel = document.getElementById(id);
    const input = sel.nextElementSibling;
    if (input) input.classList.toggle('disabled-field', sel.value === 'none');
  });

  // Grey out ranged checkbox if attacker has no ranged type selected with strength > 0
  const RANGED_TYPES_VIS = ['missile', 'boulder', 'magic_c', 'magic_n', 'magic_s'];
  const aRtbVal = parseInt(document.getElementById('aRtb').value) || 0;
  const hasRanged = RANGED_TYPES_VIS.includes(document.getElementById('aRtbType').value) && aRtbVal > 0;
  const rangedCheckLabel = document.getElementById('rangedCheckLabel');
  const rangedCheck = document.getElementById('rangedCheck');
  rangedCheckLabel.classList.toggle('disabled-field', !hasRanged);

  // Grey out ranged distance if ranged checkbox is not active
  const isRanged = hasRanged && rangedCheck.checked;
  document.getElementById('rangedDistLabel').classList.toggle('disabled-field', !isRanged);
  document.getElementById('rangedDist').classList.toggle('disabled-field', !isRanged);
}

document.querySelectorAll('input, select').forEach(el => {
  el.addEventListener('input', () => { updateTypeVisibility(); updateModifiedDisplay('a'); updateModifiedDisplay('b'); calculate(); });
  el.addEventListener('change', () => { updateTypeVisibility(); updateModifiedDisplay('a'); updateModifiedDisplay('b'); calculate(); });
});

// Generate preset buttons from PRESETS data
(function buildPresetButtons() {
  const container = document.getElementById('presetButtons');
  for (const [name, preset] of Object.entries(PRESETS)) {
    const parts = preset.desc.split(/:\s*(.+)/);
    const title = parts[0];
    const sub = parts[1] || '';
    const exp = preset.expected;
    const expLine = exp ? `E[A]=${exp.dmgToA.toFixed(3)} E[B]=${exp.dmgToB.toFixed(3)}` : '';
    const btn = document.createElement('button');
    btn.onclick = () => applyPreset(name);
    btn.innerHTML = `${title}<br><small>${sub}</small>` +
      (expLine ? `<br><small style="color:var(--accent)">${expLine}</small>` : '');
    container.appendChild(btn);
  }
})();

// Initial load: populate unit dropdowns for selected version
onVersionChange();

// --- Test Runner ---
// Call runTests() from the browser console or via Playwright to verify all presets.
function runTests(tolerance) {
  tolerance = tolerance || 0.002;
  const results = [];
  let allPassed = true;
  for (const [name, preset] of Object.entries(PRESETS)) {
    if (!preset.expected) continue;
    applyPreset(name);
    const panels = document.querySelectorAll('.dist-header .avg');
    const dmgToA = parseFloat(panels[0].textContent);
    const dmgToB = parseFloat(panels[1].textContent);
    const errA = Math.abs(dmgToA - preset.expected.dmgToA);
    const errB = Math.abs(dmgToB - preset.expected.dmgToB);
    const pass = errA < tolerance && errB < tolerance;
    if (!pass) allPassed = false;
    results.push({
      name, pass,
      dmgToA, expectedA: preset.expected.dmgToA, errA: +errA.toFixed(4),
      dmgToB, expectedB: preset.expected.dmgToB, errB: +errB.toFixed(4),
    });
  }
  const failures = results.filter(r => !r.pass);
  if (allPassed) {
    console.log(`All ${results.length} tests passed.`);
  } else {
    console.error(`${failures.length}/${results.length} tests FAILED:`);
    failures.forEach(f => console.error(`  ${f.name}: A=${f.dmgToA} (exp ${f.expectedA}, err ${f.errA}), B=${f.dmgToB} (exp ${f.expectedB}, err ${f.errB})`));
  }
  return { allPassed, total: results.length, failures };
}
