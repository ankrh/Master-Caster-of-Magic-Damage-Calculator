<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoM Damage Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Master/Caster of Magic &mdash; Damage Calculator</h1>
<div class="version-bar">
  <label for="gameVersion">Game Version:</label>
  <select id="gameVersion">
    <option value="mom_1.31" selected>MoM 1.31</option>
    <option value="mom_cp_1.60.00">MoM CP 1.60</option>
    <option value="com_6.08">CoM 6.08</option>
    <option value="com2_1.05.11">CoM2 1.05.11</option>
  </select>
  <button id="swapBtn" class="swap-btn" title="Swap attacker and defender">&#8644; Swap</button>
</div>

<div class="page-layout">

<div class="presets">
  <h2>Test Cases</h2>
  <div id="presetButtons"></div>
</div>

<div class="main-content">
<div class="panels">
  <div class="panel">
    <div class="panel-header">
      <h2>Attacker</h2>
      <div class="unit-combobox"><input type="text" id="aUnitSearch" class="unit-search" placeholder="Custom" autocomplete="off"><div class="unit-dropdown-list" id="aUnitList"></div><input type="hidden" id="aUnit" value="custom"></div>
    </div>
    <div class="panel-fields">
      <label for="aAbil_unitType" data-tooltip="Affects which enchantments can be cast on the unit and some immunity effects.">Unit Type</label>
      <select id="aAbil_unitType">
        <option value="normal">Normal</option>
        <option value="hero">Hero</option>
        <option value="fantastic_nature">Fantastic (Nature)</option>
        <option value="fantastic_sorcery">Fantastic (Sorcery)</option>
        <option value="fantastic_chaos">Fantastic (Chaos)</option>
        <option value="fantastic_life">Fantastic (Life)</option>
        <option value="fantastic_death">Fantastic (Death)</option>
        <option value="fantastic_arcane">Fantastic (Arcane)</option>
      </select>

      <label for="aFigs" data-tooltip="Number of figures in the unit. Each living figure contributes attacks.">Figures</label>
      <input type="number" id="aFigs" min="1" max="9" value="4">
      <span class="mod-val"></span>

      <label for="aAtk" data-tooltip="Melee attack strength — number of dice rolled per figure.">Attack</label>
      <input type="number" id="aAtk" min="0" max="50" value="3">
      <span class="mod-val" id="aAtkMod"></span>

      <label for="aRtbType" data-tooltip="Ranged, thrown or breath attack type and strength.">Ranged/Thrown/Breath</label>
      <select class="mid" id="aRtbType">
        <option value="none" selected>None</option>
        <option value="missile">Missile</option>
        <option value="boulder">Boulder</option>
        <option value="magic_c">Chaos magic</option>
        <option value="magic_n">Nature magic</option>
        <option value="magic_s">Sorcery magic</option>
        <option value="thrown">Thrown</option>
        <option value="fire">Fire breath</option>
        <option value="lightning">Lightning breath</option>
      </select>
      <input type="number" id="aRtb" min="0" max="50" value="0">
      <span class="mod-val" id="aRtbMod"></span>

      <label for="aToHitMod" data-tooltip="Base 30% + modifier = chance per die to score a hit (melee).">To hit melee</label>
      <span class="prefix">30% +</span>
      <input type="number" id="aToHitMod" min="-20" max="70" value="0">
      <span class="mod-val" id="aToHitMeleeMod"></span>

      <label for="aToHitRtbMod" data-tooltip="Base 30% + modifier = chance per die to score a hit (ranged/thrown/breath).">To hit ranged/thrown/breath</label>
      <span class="prefix">30% +</span>
      <input type="number" id="aToHitRtbMod" min="-20" max="70" value="0">
      <span class="mod-val" id="aToHitRtbModDisp"></span>

      <label for="aToBlkMod" data-tooltip="Base 30% + modifier = chance per defense die to perform a block.">To block</label>
      <span class="prefix">30% +</span>
      <input type="number" id="aToBlkMod" min="-20" max="70" value="0">
      <span class="mod-val" id="aToBlkModDisp"></span>

      <label for="aDef" data-tooltip="Number of defense dice rolled. Each block removes one incoming hit.">Defense</label>
      <input type="number" id="aDef" min="0" max="50" value="2">
      <span class="mod-val" id="aDefMod"></span>

      <label for="aRes" data-tooltip="Resist score used in resistance rolls. Each point = 10% chance to resist.">Resistance</label>
      <input type="number" id="aRes" min="0" max="50" value="5">
      <span class="mod-val" id="aResMod"></span>

      <label for="aHP" data-tooltip="Hit points per figure.">Hit Points</label>
      <input type="number" id="aHP" min="1" max="99" value="1">
      <span class="mod-val" id="aHPMod"></span>

      <label for="aDmg" data-tooltip="Damage already taken.">Damage Taken</label>
      <input type="number" id="aDmg" min="0" max="999" value="0">
      <span class="mod-val"></span>

      <label for="aLevel" data-tooltip="MoM 1.31 &amp; 1.60:&#10;Regular:     +1 atk/rng/thr, +1 res&#10;Veteran:     +1 atk/rng/thr, +2 res, +1 def&#10;Elite:       +2 atk/rng/thr, +3 res, +1 def, +1 hp, +10% hit&#10;Ultra Elite: +2 atk/rng/thr, +4 res, +2 def, +1 hp, +20% hit&#10;Champion:    +3 atk/rng/thr, +5 res, +2 def, +2 hp, +30% hit&#10;&#10;CoM &amp; CoM2:&#10;Regular:     +1 atk/rng, +1 res&#10;Veteran:     +2 atk/rng, +1 res, +1 thr, +1 def&#10;Elite:       +2 atk/rng, +2 res, +1 thr, +2 def, +1 hp&#10;Ultra Elite: +3 atk/rng, +2 res, +1 thr, +3 def, +1 hp&#10;Champion:    +3 atk/rng, +2 res, +1 thr, +3 def, +2 hp, +10% hit">Level</label>
      <select id="aLevel" disabled>
        <option value="normal" selected>Normal</option>
        <option value="regular">Regular</option>
        <option value="veteran">Veteran</option>
        <option value="elite">Elite</option>
        <option value="ultra_elite">Ultra Elite</option>
        <option value="champion">Champion</option>
      </select>

      <label for="aWeapon" data-tooltip="Magic:      +10% To Hit&#10;Mithril:    +10% To Hit, +1 atk, +1 def&#10;Adamantium: +10% To Hit, +2 atk, +2 def&#10;All three bypass Weapon Immunity.&#10;To Hit: melee, missile, boulder only.&#10;Atk:    melee, missile, boulder, thrown only.">Weapon Type</label>
      <select id="aWeapon">
        <option value="normal" selected>Normal</option>
        <option value="magic">Magic</option>
        <option value="mithril">Mithril</option>
        <option value="adamantium">Adamantium</option>
      </select>

      <label for="aArmor" data-tooltip="Orihalcon: +1 resistance, +2 magic ranged attack.">Armor Type</label>
      <select id="aArmor">
        <option value="normal" selected>Normal</option>
        <option value="orihalcon">Orihalcon</option>
      </select>
    </div>
    <div class="abilities-section hide-inactive">
      <button class="toggle-abil-btn" title="Show/hide inactive abilities and enchantments">Show all abilities</button>
      <div class="abilities-content" id="aAbilities"></div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <h2>Defender</h2>
      <div class="unit-combobox"><input type="text" id="bUnitSearch" class="unit-search" placeholder="Custom" autocomplete="off"><div class="unit-dropdown-list" id="bUnitList"></div><input type="hidden" id="bUnit" value="custom"></div>
    </div>
    <div class="panel-fields">
      <label for="bAbil_unitType" data-tooltip="Affects which enchantments can be cast on the unit and some immunity effects.">Unit Type</label>
      <select id="bAbil_unitType">
        <option value="normal">Normal</option>
        <option value="hero">Hero</option>
        <option value="fantastic_nature">Fantastic (Nature)</option>
        <option value="fantastic_sorcery">Fantastic (Sorcery)</option>
        <option value="fantastic_chaos">Fantastic (Chaos)</option>
        <option value="fantastic_life">Fantastic (Life)</option>
        <option value="fantastic_death">Fantastic (Death)</option>
        <option value="fantastic_arcane">Fantastic (Arcane)</option>
      </select>

      <label for="bFigs">Figures</label>
      <input type="number" id="bFigs" min="1" max="9" value="4">
      <span class="mod-val"></span>

      <label for="bAtk">Attack</label>
      <input type="number" id="bAtk" min="0" max="50" value="3">
      <span class="mod-val" id="bAtkMod"></span>

      <label for="bRtbType">Ranged/Thrown/Breath</label>
      <select class="mid" id="bRtbType">
        <option value="none" selected>None</option>
        <option value="missile">Missile</option>
        <option value="boulder">Boulder</option>
        <option value="magic_c">Magic (C)</option>
        <option value="magic_n">Magic (N)</option>
        <option value="magic_s">Magic (S)</option>
        <option value="thrown">Thrown</option>
        <option value="fire">Fire</option>
        <option value="lightning">Lightning</option>
      </select>
      <input type="number" id="bRtb" min="0" max="50" value="0">
      <span class="mod-val" id="bRtbMod"></span>

      <label for="bToHitMod">To hit melee</label>
      <span class="prefix">30% +</span>
      <input type="number" id="bToHitMod" min="-20" max="70" value="0">
      <span class="mod-val" id="bToHitMeleeMod"></span>

      <label for="bToHitRtbMod">To hit ranged/thrown/breath</label>
      <span class="prefix">30% +</span>
      <input type="number" id="bToHitRtbMod" min="-20" max="70" value="0">
      <span class="mod-val" id="bToHitRtbModDisp"></span>

      <label for="bToBlkMod">To block</label>
      <span class="prefix">30% +</span>
      <input type="number" id="bToBlkMod" min="-20" max="70" value="0">
      <span class="mod-val" id="bToBlkModDisp"></span>

      <label for="bDef">Defense</label>
      <input type="number" id="bDef" min="0" max="50" value="2">
      <span class="mod-val" id="bDefMod"></span>

      <label for="bRes">Resistance</label>
      <input type="number" id="bRes" min="0" max="50" value="5">
      <span class="mod-val" id="bResMod"></span>

      <label for="bHP">Hit Points</label>
      <input type="number" id="bHP" min="1" max="99" value="1">
      <span class="mod-val" id="bHPMod"></span>

      <label for="bDmg">Damage Taken</label>
      <input type="number" id="bDmg" min="0" max="999" value="0">
      <span class="mod-val"></span>

      <label for="bLevel">Level</label>
      <select id="bLevel" disabled>
        <option value="normal" selected>Normal</option>
        <option value="regular">Regular</option>
        <option value="veteran">Veteran</option>
        <option value="elite">Elite</option>
        <option value="ultra_elite">Ultra Elite</option>
        <option value="champion">Champion</option>
      </select>

      <label for="bWeapon">Weapon Type</label>
      <select id="bWeapon">
        <option value="normal" selected>Normal</option>
        <option value="magic">Magic</option>
        <option value="mithril">Mithril</option>
        <option value="adamantium">Adamantium</option>
      </select>

      <label for="bArmor">Armor Type</label>
      <select id="bArmor">
        <option value="normal" selected>Normal</option>
        <option value="orihalcon">Orihalcon</option>
      </select>
    </div>
    <div class="abilities-section hide-inactive">
      <button class="toggle-abil-btn" title="Show/hide inactive abilities and enchantments">Show all abilities</button>
      <div class="abilities-content" id="bAbilities"></div>
    </div>
  </div>
</div>

<div class="combat-enchantments">
  <div class="enchant-row">
    <label class="abil-check" data-tooltip="True Light (MoM 1.31 & 1.60 only): Life fantastic units +1 mel/rng/def/res; Death units &#8722;1.&#10;Darkness: Death fantastic units +1 mel/rng/def/res; Life units &#8722;1.&#10;Neither/Both: Neither is cast, or both cancel out."><span class="realm-life">True Light</span>/<span class="realm-death">Darkness</span>:
      <select id="enchLightDark" class="enchant-row-select">
        <option value="none" selected>Neither/Both</option>
        <option value="trueLight">True Light</option>
        <option value="darkness">Darkness</option>
      </select>
    </label>
    <span class="field-group">
      <label for="cityWalls" data-tooltip="Defense bonus applied to the defender only.&#10;MoM 1.31: Intact city wall: +3 def. Destroyed city wall or inner area: +1 def.&#10;MoM 1.60, CoM 1 &amp; 2: Intact city wall or inner area: +3 def. Destroyed city wall: +1 def.">City walls:</label>
      <select id="cityWalls">
        <option value="none" selected>None</option>
        <option value="1">+1 def</option>
        <option value="3">+3 def</option>
      </select>
    </span>
    <label class="abil-check" data-tooltip="Matching fantastic units get +2 melee, ranged, thrown, breath, gaze, defense, and resistance.">Node aura:
      <select id="nodeAura" class="enchant-row-select">
        <option value="none" selected>None</option>
        <option value="chaos">Chaos</option>
        <option value="nature">Nature</option>
        <option value="sorcery">Sorcery</option>
      </select>
    </label>
    <label class="check-label" data-tooltip="Area fire attack on all attacker figures, firing before the melee phase.&#10;MoM 1.31 &amp; 1.60: Strength 5.&#10;CoM 1 &amp; 2: Strength 10.&#10;Immune: Fire Immunity, Magic Immunity, Righteousness.">
      <input type="checkbox" id="wallOfFire"> <span class="realm-chaos">Wall of Fire</span>
    </label>
    <label class="check-label" data-tooltip="All non-Chaos units get &#8722;20% To Hit.">
      <input type="checkbox" id="warpReality"> <span class="realm-chaos">Warp Reality</span>
    </label>
  </div>
  <div class="enchant-row" style="justify-content: flex-start; gap: 1.5rem;">
    <label id="rangedCheckLabel" class="check-label" data-tooltip="Sets combat mode to ranged. Only available if the attacker has a ranged attack.">
      <input type="checkbox" id="rangedCheck" checked> Ranged attack
    </label>
    <span class="field-group" id="rangedDistLabel">
      <label for="rangedDist" data-tooltip="Missile and boulder only. Magic ranged ignores distance.&#10;MoM 1.31 &amp; 1.60: &#8722;10/&#8722;20/&#8722;30% at 3/6/9 tiles.&#10;CoM 1: &#8722;10/&#8722;20/&#8722;30% at 4/8/12 tiles.&#10;CoM 2: &#8722;10% at 4 tiles, then &#8722;3% per additional tile.&#10;Long Range caps penalty at &#8722;10%.">Ranged attack distance:</label>
      <input type="number" id="rangedDist" min="1" max="99" value="1">
    </span>
  </div>
</div>


<div class="results" id="results">
  <div class="dist-panel" id="distA"></div>
  <div class="dist-panel" id="distB"></div>
  <div class="life-steal-summary" id="lifeStealSummary" style="display:none"></div>
  <div class="breakdown-section" id="breakdownSection" style="display:none">
    <div class="breakdown-label">Damage breakdown by phase</div>
    <div class="breakdown-grid" id="breakdownGrid"></div>
  </div>
</div>
  
</div><!-- /main-content -->
</div><!-- /page-layout -->

<!-- Load order: units (data blobs) -> data (constants) -> engine (math) -> combat (logic) -> ui (DOM) -->
<div id="tt" class="tt"></div>
<script src="units.js"></script>
<script src="data.js"></script>
<script src="engine.js"></script>
<script src="combat.js"></script>
<script src="ui.js"></script>
</body>
</html>
